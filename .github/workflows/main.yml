- name: Battleplan Verification - Inline
  run: |
    set -e
    echo "=== Verifying conductor Shaw ==="
    sha256sum -c data/S6_pi10.txt.sha256
    ./bin/print_S6_pi10 data/S6_pi10.txt
    
    echo "=== Verifying exceptional set Shaw ===" 
    sha256sum -c data/S_pi10_exceptional.txt.sha256
    ./bin/print_S_pi10_exceptional data/S_pi10_exceptional.txt
    
    echo "=== JSON count check ==="
    [ "$(jq '.count' data/S6_pi10.json)" = "2" ]
    [ "$(jq '.count' data/S_pi10_exceptional.json)" = "14" ]
    echo "VERIFY: PASS"
