name: Battleplan v1.6 CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SageMath
        run: sudo apt-get update && sudo apt-get install -y sagemath

      - name: Run Sage machines
        run: |
          sage sage/conductor_N10.sage
          sage sage/exceptional_S_pi10.sage

      - name: Verify dual Shaws
        run: |
          echo "Verifying conductor Shaw..."
          sha256sum -c data/S6_pi10.txt.sha256
          echo "Verifying exceptional Shaw..."
          sha256sum -c data/S_pi10_exceptional.txt.sha256

      - name: Compile PDF
        run: |
          sudo apt-get install -y texlive-latex-base texlive-latex-extra
          pdflatex -interaction=nonstopmode main.tex
          pdflatex -interaction=nonstopmode main.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: main-pdf
          path: main.pdf
