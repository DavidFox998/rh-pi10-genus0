      - name: Compile PDF
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended
          pdflatex -interaction=nonstopmode main.tex
          pdflatex -interaction=nonstopmode main.tex

      - name: Create definitive PDF with timestamp
        id: pdfname
        run: |
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          CONDUCTOR_SHA=$(head -c 8 data/S6_pi10.txt.sha256)
          EXCEPT_SHA=$(head -c 8 data/S_pi10_exceptional.txt.sha256)
          FILENAME="RH-pi10-genus0-v1.6-${TIMESTAMP}-${CONDUCTOR_SHA}-${EXCEPT_SHA}.pdf"
          cp main.pdf "$FILENAME"
          echo "pdf_name=$FILENAME" >> $GITHUB_OUTPUT
          echo "Final PDF: $FILENAME"

      - name: Upload Referee PDF
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pdfname.outputs.pdf_name }}
          path: ${{ steps.pdfname.outputs.pdf_name }}
          retention-days: 90
