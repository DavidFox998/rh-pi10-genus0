name: Battleplan v1.6 CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Python machines
        run: |
          python3 sage/conductor_N10.sage
          python3 sage/exceptional_S_pi10.sage

      - name: Verify dual Shaws
        run: |
          echo "Verifying conductor Shaw..."
          sha256sum -c data/S6_pi10.txt.sha256
          echo "Verifying exceptional Shaw..."
          sha256sum -c data/S_pi10_exceptional.txt.sha256

      - name: Compile PDF
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended
          pdflatex -interaction=nonstopmode main.tex
          pdflatex -interaction=nonstopmode main.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: main-pdf
          path: main.pdf
