- name: Run Sage machines
  run: |
    sage sage/conductor_N10.sage # outputs {2,5} for genus 0
    sage sage/exceptional_S_pi10.sage # outputs 4+1+9 = 14 primes for C(alpha)
    
- name: Verify both sets
  run: |
    echo "=== Conductor primes ==="
    cat data/S6_pi10.txt
    echo "=== Exceptional set ===" 
    wc -l data/S_pi10_exceptional.txt # Must be 14
    sha256sum -c data/S_pi10_exceptional.txt.sha256
