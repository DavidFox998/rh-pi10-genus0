cat > .github/workflows/Verify-and-Build.yml << 'EOF'
name: Verify-and-Build
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    container:
      image: sagemath/sagemath:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Run conductor N=10 verification
        run: |
          sage Paper5_RH/sage/conductor_N10.sage
          
      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Paper5_RH/main.tex
          args: -pdf -interaction=nonstopmode -file-line-error
          
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: rh-pi10-genus0
          path: Paper5_RH/main.pdf
EOF
